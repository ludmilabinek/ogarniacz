# fly.toml app configuration file for ogarniacz
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = "ogarniacz"
primary_region = "fra"

# MVP: 1 machine only, no HA peer. Accepts ~5s downtime on deploy.
# Auto-stop on idle: maszyna gaśnie gdy brak ruchu (min_machines_running=0),
# wstaje na pierwszy request (~10-25s cold start dla Spring Boot).
# Przed demo/certyfikacją: zmień auto_stop_machines na "suspend" (sub-sekundowy wake).
# To re-enable HA later: `flyctl scale count 2` and switch strategy to "rolling".

[build]

[env]
  SENTRY_ENVIRONMENT = "production"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  size = "shared-cpu-1x"
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
