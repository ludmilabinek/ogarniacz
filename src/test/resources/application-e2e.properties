# E2E profile — used by Playwright via ./gradlew bootTestRun --args='--spring.profiles.active=e2e'.
# Picked up from src/test/resources (visible to bootTestRun, not packaged into prod artifact).

# In-memory H2, recreated per JVM. ddl-auto=create-drop because every E2E run starts clean.
spring.datasource.url=jdbc:h2:mem:ogarniacz-e2e;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# persistent_logins (Spring Security remember-me) is owned by external migration in
# prod; under e2e we create it via schema-e2e.sql AFTER Hibernate has built JPA tables.
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema-e2e.sql
spring.jpa.defer-datasource-initialization=true

# Plain HTTP cookies for localhost — same shape as the dev override documented in
# the main properties' SERVER_SERVLET_SESSION_COOKIE_SECURE note.
server.servlet.session.cookie.secure=false

# Static remember-me key. Never used outside the e2e profile.
REMEMBER_ME_KEY=e2e-remember-me-key-not-for-production

# OpenRouter call path is replaced by StubLlmVisionClient (@Primary under "e2e").
# Spring AI auto-config still validates these — keep placeholders so its bean wiring works.
spring.ai.openai.api-key=e2e-placeholder-key

# Tighter purge interval (10s) so anything testing source-image lifecycle has visible signal.
app.event.source-image.purge.interval-ms=10000

# Disable Spring DevTools restart watcher under bootTestRun.
spring.devtools.restart.enabled=false

# Pin locale to English so Thymeleaf's #temporals.format(date, 'EEE d MMM yyyy') is
# deterministic across CI machines, JVM defaults and browser Accept-Language headers.
# E2E asserts on the rendered date string — locale instability would make it flaky.
spring.web.locale=en
spring.web.locale-resolver=fixed
