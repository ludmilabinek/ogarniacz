<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Log in')}"></head>
<body>
<main class="auth-page">
    <h1>Log in</h1>
    <div th:if="${param.error}" class="form-error">Invalid email or password.</div>
    <div th:if="${param.logout}" class="form-notice">You have been logged out.</div>
    <form th:action="@{/login}" method="post" class="stacked">
        <label>Email
            <input type="email" name="username" autocomplete="email" required/>
        </label>
        <label>Password
            <input type="password" name="password" autocomplete="current-password" required/>
        </label>
        <button type="submit">Log in</button>
    </form>
    <p>No account? <a th:href="@{/signup}">Sign up</a></p>
</main>
</body>
</html>
