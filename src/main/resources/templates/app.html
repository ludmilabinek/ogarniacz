<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ogarniacz')}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<main class="app-page">
    <div class="flash-success" th:if="${successMessage != null}" th:text="${successMessage}"></div>
    <p>Signed in as <span th:text="${userEmail}">user@example.com</span>.</p>
    <p>
        <a th:href="@{/events/new}" class="primary-action">Add event</a>
        <a th:href="@{/events/from-image}" class="primary-action">Dodaj z obrazka</a>
    </p>
    <ul class="event-list" th:if="${!#lists.isEmpty(events)}">
        <li th:each="e : ${events}">
            <span class="event-when">
                <span th:text="${#temporals.format(e.eventDate, 'EEE d MMM yyyy')}">Mon 1 Jan 2026</span>
                <span th:if="${e.eventTime != null}" th:text="${#temporals.format(e.eventTime, 'HH:mm')}">09:00</span>
            </span>
            <strong th:text="${e.title}">Event title</strong>
            <p class="event-requirements" th:if="${e.requirements != null and !#strings.isEmpty(e.requirements)}" th:text="${e.requirements}"></p>
            <p class="event-notes" th:if="${e.notes != null and !#strings.isEmpty(e.notes)}" th:text="${e.notes}"></p>
        </li>
    </ul>
    <p class="empty-state" th:if="${#lists.isEmpty(events)}">No events yet. Add one above.</p>
</main>
</body>
</html>
