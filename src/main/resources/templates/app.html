<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Ogarniacz')}"></head>
<body>
<header th:replace="~{fragments/layout :: topbar}"></header>
<main class="app-page">
    <div class="flash-success" th:if="${successMessage != null}" th:text="${successMessage}"></div>
    <div class="button-group">
        <a th:href="@{/events/new}" class="primary-action">Dodaj wydarzenie</a>
        <a th:href="@{/events/from-image}" class="primary-action">Dodaj ze zdjęcia</a>
    </div>
    <ul class="event-list" th:if="${!#lists.isEmpty(events)}">
        <li th:each="e : ${events}">
            <span class="event-when">
                <span th:text="${#temporals.format(e.eventDate, 'EEE d MMM yyyy')}">Mon 1 Jan 2026</span>
                <span th:if="${e.eventTime != null}" th:text="${#temporals.format(e.eventTime, 'HH:mm')}">09:00</span>
            </span>
            <strong th:text="${e.title}">Event title</strong>
            <p class="event-requirements" th:if="${e.requirements != null and !#strings.isEmpty(e.requirements)}" th:text="${e.requirements}"></p>
            <p class="event-notes" th:if="${e.notes != null and !#strings.isEmpty(e.notes)}" th:text="${e.notes}"></p>
            <div class="row-actions">
                <a th:href="@{/events/{id}/edit(id=${e.id})}" class="row-action">Edytuj</a>
                <form th:action="@{/events/{id}/delete(id=${e.id})}" method="post"
                      class="row-action-form"
                      th:attr="data-title=${e.title}"
                      onsubmit="return confirm('Usunąć wydarzenie „' + this.dataset.title + '”?');">
                    <button type="submit" class="row-action row-action--danger">Usuń</button>
                </form>
            </div>
        </li>
    </ul>
    <p class="empty-state" th:if="${#lists.isEmpty(events)}">Nie masz jeszcze wydarzeń. Dodaj pierwsze powyżej.</p>
</main>
</body>
</html>
