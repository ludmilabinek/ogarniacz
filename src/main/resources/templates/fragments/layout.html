<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'Ogarniacz'">Ogarniacz</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; color: #1f2328; }
        header.topbar {
            background: #f6f8fa; border-bottom: 1px solid #d0d7de;
            padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        header.topbar .user-email { font-weight: 500; }
        header.topbar .topbar-right { display: flex; align-items: center; gap: 1rem; }
        header.topbar .topbar-right a { color: #1f6feb; text-decoration: none; }
        header.topbar form { margin: 0; }
        header.topbar button {
            background: none; border: 1px solid #d0d7de; padding: 0.4rem 0.9rem;
            border-radius: 6px; cursor: pointer;
        }
        main.auth-page, main.app-page { max-width: 28rem; margin: 4rem auto; padding: 0 1.5rem; }
        main.app-page { max-width: 40rem; text-align: center; }
        main.app-page .empty-state { color: #57606a; margin-top: 4rem; }
        .primary-action {
            display: inline-block; padding: 0.5rem 1rem; border: 1px solid #1f6feb;
            border-radius: 6px; color: #1f6feb; text-decoration: none;
        }
        .event-list { list-style: none; padding: 0; margin: 2rem 0; text-align: left; }
        .event-list li {
            border: 1px solid #d0d7de; border-radius: 6px;
            padding: 0.75rem 1rem; margin-bottom: 0.5rem;
        }
        .event-list .event-when { display: block; font-size: 0.875rem; color: #57606a; }
        .event-list .event-requirements, .event-list .event-notes { margin: 0.5rem 0 0; }
        form.stacked label { display: block; margin: 0.75rem 0; }
        form.stacked input { display: block; width: 100%; padding: 0.5rem; box-sizing: border-box; }
        form.stacked button { padding: 0.5rem 1rem; margin-top: 0.5rem; }
        .field-error { color: #cf222e; font-size: 0.875rem; display: block; margin-top: 0.25rem; }
        .form-error { color: #cf222e; padding: 0.5rem; border: 1px solid #cf222e; border-radius: 6px; margin-bottom: 1rem; }
        .form-notice { color: #1a7f37; padding: 0.5rem; border: 1px solid #1a7f37; border-radius: 6px; margin-bottom: 1rem; }
        main.settings-page { max-width: 40rem; margin: 3rem auto; padding: 0 1.5rem; }
        main.settings-page h1 { margin: 0 0 1.5rem; }
        main.settings-page section { margin-bottom: 2rem; }
        main.settings-page .feed-url label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
        main.settings-page .feed-url-row { display: flex; gap: 0.5rem; }
        main.settings-page .feed-url-row input { flex: 1; padding: 0.5rem; border: 1px solid #d0d7de; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, monospace; }
        main.settings-page .feed-url-row button { background: none; border: 1px solid #d0d7de; padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; }
        main.settings-page .hint { color: #57606a; font-size: 0.875rem; margin-top: 0.5rem; }
        main.settings-page .subscribe-instructions h2 { font-size: 1.125rem; margin: 0 0 0.5rem; }
        main.settings-page .subscribe-instructions p { margin: 0.5rem 0; }
    </style>
</head>
<body>
<header th:fragment="topbar" class="topbar">
    <span class="user-email" th:text="${userEmail}">user@example.com</span>
    <div class="topbar-right">
        <a th:href="@{/settings}">Settings</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Log out</button>
        </form>
    </div>
</header>
</body>
</html>
