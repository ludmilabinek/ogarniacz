<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head(title)">
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${title} ?: 'Ogarniacz'">Ogarniacz</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; margin: 0; color: #1f2328; }
        a { color: #1a7f37; }
        header.topbar {
            background: #f6f8fa; border-bottom: 1px solid #d0d7de;
            padding: 0.75rem 1.5rem;
            display: flex; justify-content: space-between; align-items: center;
        }
        header.topbar .user-email { font-weight: 500; }
        header.topbar .brand {
            display: inline-flex; align-items: center; gap: 0.1rem;
            text-decoration: none; border-radius: 6px;
        }
        header.topbar .brand .brand-mark { height: 34px; width: auto; display: block; }
        header.topbar .brand .brand-wordmark { height: 19px; width: auto; display: block; }
        header.topbar .brand:hover { opacity: 0.8; }
        header.topbar .brand:focus-visible {
            outline: none; box-shadow: 0 0 0 3px #d2f4dd;
        }
        header.topbar .topbar-right { display: flex; align-items: center; gap: 1rem; }
        header.topbar .topbar-right a { color: #1a7f37; text-decoration: none; }
        header.topbar form { margin: 0; }
        header.topbar button {
            background: none; border: 1px solid #d0d7de; padding: 0.4rem 0.9rem;
            border-radius: 6px; cursor: pointer;
        }
        main.auth-page, main.app-page { max-width: 28rem; margin: 4rem auto; padding: 0 1.5rem; }
        main.auth-page .auth-logo { display: block; height: 128px; width: auto; margin: 0 auto 1.5rem; }
        main.app-page { max-width: 40rem; text-align: center; }
        main.app-page .empty-state { color: #57606a; margin-top: 4rem; }
        .button-group {
            display: flex; gap: 0.75rem; flex-wrap: wrap; justify-content: center;
        }
        .primary-action {
            display: inline-block; padding: 0.5rem 1rem; border: 1px solid #1a7f37;
            border-radius: 6px; color: #1a7f37; text-decoration: none;
        }
        .primary-action:hover, .primary-action:focus-visible {
            background: #d2f4dd; outline: none;
        }
        .event-list { list-style: none; padding: 0; margin: 2rem 0; text-align: left; }
        .event-list li {
            border: 1px solid #d0d7de; border-radius: 6px;
            padding: 0.75rem 1rem; margin-bottom: 0.5rem;
        }
        .event-list .event-when { display: block; font-size: 0.875rem; color: #57606a; }
        .event-list .event-requirements, .event-list .event-notes { margin: 0.5rem 0 0; }
        .event-list .row-actions {
            display: flex; gap: 0.75rem; margin-top: 0.75rem; align-items: center;
        }
        .event-list .row-action-form { margin: 0; }
        .event-list .row-action {
            display: inline-flex; align-items: center; justify-content: center;
            box-sizing: border-box;
            min-width: 44px; min-height: 44px; padding: 0.5rem 0.9rem;
            border: 1px solid #d0d7de; border-radius: 6px;
            background: #ffffff; color: #1f2328;
            text-decoration: none;
            font-family: inherit; font-size: 0.9375rem; line-height: 1;
            appearance: none; -webkit-appearance: none; cursor: pointer;
        }
        .event-list .row-action:hover, .event-list .row-action:focus-visible {
            background: #f6f8fa; outline: none;
        }
        .event-list .row-action--danger {
            border-color: #cf222e; color: #cf222e;
        }
        .event-list .row-action--danger:hover,
        .event-list .row-action--danger:focus-visible { background: #ffebe9; }
        form.stacked label { display: block; margin: 1rem 0; font-weight: 500; font-size: 0.9375rem; }
        form.stacked input,
        form.stacked textarea {
            display: block; width: 100%; margin-top: 0.35rem;
            padding: 0.5rem 0.625rem; box-sizing: border-box;
            border: 1px solid #d0d7de; border-radius: 6px;
            font: inherit; color: #1f2328; background: #ffffff;
        }
        form.stacked textarea { resize: vertical; }
        form.stacked input:focus, form.stacked textarea:focus {
            border-color: #1a7f37; outline: none; box-shadow: 0 0 0 3px #d2f4dd;
        }
        form.stacked button {
            padding: 0.55rem 1.1rem; margin-top: 0.75rem;
            border: 1px solid #1a7f37; border-radius: 6px;
            background: #1a7f37; color: #ffffff;
            font: inherit; font-weight: 500; cursor: pointer;
        }
        form.stacked button:hover, form.stacked button:focus-visible {
            background: #15692e; border-color: #15692e; outline: none;
        }
        .cancel-link { color: #57606a; text-decoration: none; }
        .cancel-link:hover, .cancel-link:focus-visible { text-decoration: underline; outline: none; }
        .form-actions { display: flex; gap: 0.75rem; align-items: center; flex-wrap: wrap; margin-top: 0.75rem; }
        .form-actions button, .form-actions .btn-secondary {
            display: inline-flex; align-items: center; justify-content: center;
            box-sizing: border-box; line-height: 1;
            padding: 0.55rem 1.1rem; border-radius: 6px;
            font: inherit; font-weight: 500; cursor: pointer;
        }
        form.stacked .form-actions button { margin-top: 0; }
        .btn-secondary {
            border: 1px solid #d0d7de;
            background: #ffffff; color: #1f2328;
            text-decoration: none;
        }
        .btn-secondary:hover, .btn-secondary:focus-visible { background: #f6f8fa; outline: none; }
        .field-error { color: #cf222e; font-size: 0.875rem; display: block; margin-top: 0.25rem; }
        .form-error { color: #cf222e; padding: 0.5rem; border: 1px solid #cf222e; border-radius: 6px; margin-bottom: 1rem; }
        .form-notice { color: #1a7f37; padding: 0.5rem; border: 1px solid #1a7f37; border-radius: 6px; margin-bottom: 1rem; }
        main.settings-page { max-width: 40rem; margin: 3rem auto; padding: 0 1.5rem; }
        main.settings-page h1 { margin: 0 0 1.5rem; }
        main.settings-page section { margin-bottom: 2rem; }
        main.settings-page .feed-url label { display: block; font-weight: 500; margin-bottom: 0.5rem; }
        main.settings-page .feed-url-row { display: flex; gap: 0.5rem; }
        main.settings-page .feed-url-row input { flex: 1; padding: 0.5rem; border: 1px solid #d0d7de; border-radius: 6px; font-family: ui-monospace, SFMono-Regular, monospace; }
        main.settings-page .feed-url-row button { background: none; border: 1px solid #d0d7de; padding: 0.4rem 0.9rem; border-radius: 6px; cursor: pointer; }
        main.settings-page .hint { color: #57606a; font-size: 0.875rem; margin-top: 0.5rem; }
        main.settings-page .subscribe-instructions h2 { font-size: 1.125rem; margin: 0 0 0.5rem; }
        main.settings-page .subscribe-instructions p { margin: 0.5rem 0; }
        .flash-success {
            color: #1a7f37; padding: 0.5rem; border: 1px solid #1a7f37;
            border-radius: 6px; margin-bottom: 1rem; text-align: center;
        }
        .review-intro { color: #57606a; text-align: left; }
        .review-empty-info { text-align: left; margin: 1.5rem 0; }
        .review-form { text-align: left; }
        .review-list { list-style: none; padding: 0; margin: 1.5rem 0; }
        .review-row {
            border: 1px solid #d0d7de; border-radius: 6px;
            padding: 1rem; margin-bottom: 1rem;
        }
        .review-row .row-action { border: none; padding: 0; margin: 0 0 0.75rem; }
        .review-row .row-action legend { font-size: 0.875rem; color: #57606a; padding: 0; }
        .review-row .row-action label { display: inline-block; margin-right: 1rem; }
        .review-row .row-fields label { display: block; margin: 0.5rem 0; font-size: 0.95rem; }
        .review-row .row-fields input,
        .review-row .row-fields textarea {
            display: block; width: 100%; padding: 0.4rem; box-sizing: border-box;
            font: inherit;
        }
    </style>
</head>
<body>
<header th:fragment="topbar" class="topbar">
    <a th:href="@{/app}" class="brand" aria-label="Ogarniacz — strona główna">
        <img class="brand-mark" th:src="@{/img/logo-mark.png}" alt=""/>
        <img class="brand-wordmark" th:src="@{/img/logo-wordmark.png}" alt=""/>
    </a>
    <div class="topbar-right">
        <span class="user-email" th:text="${userEmail}">user@example.com</span>
        <a th:href="@{/settings}">Ustawienia</a>
        <form th:action="@{/logout}" method="post">
            <button type="submit">Wyloguj</button>
        </form>
    </div>
</header>
</body>
</html>
