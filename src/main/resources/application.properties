spring.application.name=app

management.endpoints.web.exposure.include=health
management.endpoint.health.access=read-only
# UptimeRobot (Phase I) polls /actuator/health every 5 min. With the default DataSourceHealthIndicator
# enabled, each poll runs SELECT 1 on Neon — preventing Neon's 5-min idle auto-suspend and burning
# the free-tier compute-hour ceiling (~190h/mc) in ~1 week. Disable so health stays app-only while
# /actuator/health is still the placeholder monitor target. When the iCalendar feed ships and
# replaces /actuator/health as the canary URL (Phase I I.1), the feed query itself touches DB,
# so this knob becomes moot — that's the moment to revisit Neon plan tier vs. monitor interval.
management.health.db.enabled=false
# Schema migrations are additive-only for MVP. See deploy plan §5: no column drops,
# no type narrowing — rollback compatibility depends on it.
spring.jpa.hibernate.ddl-auto=update

# For local dev over http://localhost, set SERVER_SERVLET_SESSION_COOKIE_SECURE=false in
# the env to allow cookies to round-trip; production runs behind Fly's HTTPS edge so
# Secure stays on by default.
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.forward-headers-strategy=framework

# Manual event entry (S-02)
app.timezone=Europe/Warsaw
app.event.reminder.hour=8

# OpenRouter (Spring AI)
spring.ai.openai.base-url=https://openrouter.ai/api/v1
# Smoke test reads from OPENROUTER_API_KEY (local dev); production rotates AI_PROVIDER_API_KEY (Fly secret).
spring.ai.openai.api-key=${OPENROUTER_API_KEY:${AI_PROVIDER_API_KEY:placeholder-not-a-real-key}}
spring.ai.openai.chat.options.model=google/gemini-2.5-flash
spring.ai.openai.chat.options.temperature=0.2
# 55 s ceiling leaves a 5 s margin under PRD's 60 s extraction budget. No retry — PRD failure
# budget is a single shot; retries would conflate "slow" with "broken" and double-spend on failure.
spring.ai.openai.timeout=55s
spring.ai.openai.max-retries=0
# OpenRouter attribution headers — used for usage attribution + better routing rate-limits.
spring.ai.openai.custom-headers.HTTP-Referer=https://ogarniacz.fly.dev
spring.ai.openai.custom-headers.X-Title=Ogarniacz
